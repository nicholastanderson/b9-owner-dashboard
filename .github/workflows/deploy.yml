name: Deploy (CDK + site)

# Single pipeline, triggered by a merge/push to main:
#   1. cdk deploy  — provision/update S3 + CloudFront (infra as code)
#   2. build + s3 sync + CloudFront invalidation — publish the site
#
# Authenticates to AWS purely via OIDC role assumption — NO stored access keys.
# The role it assumes is created once by infra/github-oidc-bootstrap.yaml.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: cdk deploy + publish
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve CDK environment
        run: |
          echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          echo "CDK_DEFAULT_REGION=${{ vars.AWS_REGION }}" >> "$GITHUB_ENV"

      # --- 1. Infrastructure (CDK) --------------------------------------
      - name: Install infra deps
        working-directory: infra
        run: npm ci

      - name: CDK bootstrap (idempotent)
        working-directory: infra
        run: npx cdk bootstrap "aws://${CDK_DEFAULT_ACCOUNT}/${CDK_DEFAULT_REGION}"

      - name: CDK deploy
        working-directory: infra
        run: |
          npx cdk deploy --require-approval never \
            -c githubOwner=${{ vars.GH_OWNER }} \
            -c githubRepo=${{ vars.GH_REPO }} \
            -c githubBranch=main \
            -c createOidcProvider=false

      - name: Read stack outputs
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name BackNinePulseBoard \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          DIST=$(aws cloudformation describe-stacks --stack-name BackNinePulseBoard \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          URL=$(aws cloudformation describe-stacks --stack-name BackNinePulseBoard \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontUrl'].OutputValue" --output text)
          echo "SITE_BUCKET=$BUCKET" >> "$GITHUB_ENV"
          echo "DISTRIBUTION_ID=$DIST" >> "$GITHUB_ENV"
          echo "### Pulse Board deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"

      # --- 2. Site (build + publish) ------------------------------------
      - name: Install app deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync to S3
        run: |
          # Long-cache fingerprinted assets; never cache index.html so the Pi
          # always fetches the current entrypoint on refresh.
          aws s3 sync dist/ "s3://${SITE_BUCKET}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html "s3://${SITE_BUCKET}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
