name: Deploy infra (CDK)

# Provisions/updates the AWS stack (S3 + CloudFront + OIDC role) by running
# `cdk deploy` from GitHub Actions, authenticating via OIDC — no stored keys.
#
# Runs on infra changes to main, or on demand. The very first ever deploy must
# be bootstrapped locally (see README "Bootstrap order"), because this role is
# created BY the stack.
on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-main
  cancel-in-progress: false

jobs:
  cdk-deploy:
    name: cdk deploy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK deploy
        run: |
          npx cdk deploy --require-approval never \
            -c githubOwner=${{ vars.GH_OWNER }} \
            -c githubRepo=${{ vars.GH_REPO }} \
            -c githubBranch=main \
            -c createOidcProvider=false
